<!DOCTYPE html>
<html>

<head>
    <title>Payment</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="logo-container">
    <img src="../images/logo.png" class="logo">
</div>

<div class="container">

    <h2>Payment</h2>

    <h3 id="paymentTotal">
        Total Payment: RM 0.00
    </h3>

    <br>

    <label>Select Payment Method</label>

    <select id="paymentMethod"
            class="quantity-select"
            onchange="showQR()">

        <option value="cash">
            Cash
        </option>

        <option value="tng">
            TNG eWallet
        </option>

    </select>

    <br><br>

    <div id="qrSection"
         style="display:none; text-align:center;">

        <h3>Scan TNG QR Code</h3>

        <br>

        <img src="../images/tng-qr.png"
             class="qr-image"
             alt="TNG QR">

        <br><br>

        <p>
            Scan the QR code and click Confirm Payment.
        </p>

    </div>

    <br>

    <div class="buttons">

        <button id="paymentButton"
                onclick="confirmPayment()">
            Place Order
        </button>

        <a href="pickup.html">
            <button type="button">
                Back
            </button>
        </a>

    </div>

</div>

<script src="../js/app.js"></script>

<script>

loadPayment();

</script>

</body>

</html>

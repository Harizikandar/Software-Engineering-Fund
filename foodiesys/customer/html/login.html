<!DOCTYPE html>
<html>

<head>
    <title>FoodieSys Login</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="logo-container">
    <img src="../images/logo.png" class="logo">
</div>

<div class="container">

    <h2>Customer Login</h2>

    <form action="../php/login.php" method="POST">

        <label>Email</label>
        <input
            type="email"
            name="email"
            placeholder="Enter Email"
            required>

        <label>Password</label>
        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required>

        <div class="buttons">

            <button type="submit">
                Login
            </button>

            <a href="register.html">
                <button type="button">
                    Register
                </button>
            </a>

        </div>

    </form>

</div>

</body>

</html>

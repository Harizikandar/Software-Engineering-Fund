<!DOCTYPE html>
<html>

<head>
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="logo-container">
    <img src="../images/logo.png" class="logo">
</div>

<div class="container">

    <h2>Shopping Cart</h2>

    <table class="history-table">

        <thead>

            <tr>

                <th>Vendor</th>
                <th>Food</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Subtotal</th>
                <th>Action</th>

            </tr>

        </thead>

        <tbody id="cartData">

        </tbody>

    </table>

    <br>

    <h3 id="totalAmount">
        Total : RM 0.00
    </h3>

    <br>

    <div class="buttons">

        <button onclick="checkout()">
            Proceed To Pickup
        </button>

        <button onclick="clearCart()">
            Clear Cart
        </button>

        <a href="vendors.html">
            <button type="button">
                Continue Shopping
            </button>
        </a>

    </div>

</div>

<script src="../js/app.js"></script>

<script>

function checkout(){

    const cart = getCart();

    if(cart.length === 0){

        alert("Your cart is empty.");

        return;

    }

    window.location.href = "pickup.html";

}

renderCart();

</script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <title>Sushi Zen Menu</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="logo-container">
    <img src="../images/logo.png" class="logo">
</div>

<div class="container">

    <h2>Vendor: Sushi Zen</h2>

    <div class="food-container">

        <div class="food-card">

            <img src="../images/foods/salmon-roll.png" class="food-img">

            <h3>Salmon Roll</h3>

            <p>Fresh salmon wrapped with sushi rice.</p>

            <p class="price">RM 8.50</p>

            <button onclick="quickAdd(1,'Sushi Zen','Salmon Roll',8.50)">
                Add To Cart
            </button>

        </div>

        <div class="food-card">

            <img src="../images/foods/california-roll.png" class="food-img">

            <h3>California Roll</h3>

            <p>Crab stick, cucumber and avocado roll.</p>

            <p class="price">RM 10.50</p>

            <button onclick="quickAdd(2,'Sushi Zen','California Roll',10.50)">
                Add To Cart
            </button>

        </div>

        <div class="food-card">

            <img src="../images/foods/tuna-roll.png" class="food-img">

            <h3>Tuna Roll</h3>

            <p>Premium tuna wrapped in seaweed.</p>

            <p class="price">RM 12.50</p>

            <button onclick="quickAdd(3,'Sushi Zen','Tuna Roll',12.50)">
                Add To Cart
            </button>

        </div>

    </div>

    <div class="buttons">

        <a href="cart.html">
            <button type="button">
                View Cart
            </button>
        </a>

        <a href="vendors.html">
            <button type="button">
                Back
            </button>
        </a>

    </div>

</div>

<script src="../js/app.js"></script>

</body>
</html>

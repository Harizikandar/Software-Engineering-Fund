<!DOCTYPE html>
<html>

<head>
    <title>FoodieSys Register</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="logo-container">
    <img src="../images/logo.png" class="logo">
</div>

<div class="container">

    <h2>Customer Registration</h2>

    <form action="../php/register.php" method="POST">

        <label>Full Name</label>
        <input
            type="text"
            name="name"
            placeholder="Enter Full Name"
            required>

        <label>Email</label>
        <input
            type="email"
            name="email"
            placeholder="Enter Email"
            required>

        <label>Password</label>
        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required>

        <!-- Optional: Database currently doesn't store phone -->
        <label>Phone Number</label>
        <input
            type="text"
            name="phone"
            placeholder="Enter Phone Number">

        <div class="buttons">

            <button type="submit">
                Register
            </button>

            <a href="login.html">
                <button type="button">
                    Back
                </button>
            </a>

        </div>

    </form>

</div>

</body>

</html>

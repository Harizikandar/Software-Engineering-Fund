<!DOCTYPE html>
<html>

<head>
    <title>Food Details</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="logo-container">
    <img src="../images/logo.png" class="logo">
</div>

<div class="container">

    <div class="details-card">

        <h2>Food Details</h2>

        <img id="foodImage"
             class="details-img">

        <h2 id="foodName"></h2>

        <p class="description">
            Freshly prepared food made with high quality ingredients.
        </p>

        <h3 id="foodPrice"
            class="price">
        </h3>

        <label>Quantity</label>

        <select id="quantity"
                class="quantity-select">

            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>

        </select>

        <br><br>

        <div class="buttons">

            <button onclick="addFood()">
                Add To Cart
            </button>

            <a href="javascript:history.back()">
                <button type="button">
                    Back
                </button>
            </a>

        </div>

    </div>

</div>

<script src="../js/app.js"></script>

<script>

const params = new URLSearchParams(window.location.search);

const itemId=parseInt(params.get("item"));

const vendor=params.get("vendor");

const food=params.get("food");

const price=parseFloat(params.get("price"));

const img=params.get("img");

document.getElementById("foodName").innerText=food;

document.getElementById("foodPrice").innerText="RM "+price.toFixed(2);

document.getElementById("foodImage").src="../images/foods/"+img;

function addFood(){

    let quantity=parseInt(document.getElementById("quantity").value);

    addItemToCart(

        itemId,
        vendor,
        food,
        price,
        quantity

    );

}

</script>

</body>

</html>

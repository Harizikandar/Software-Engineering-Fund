<!DOCTYPE html>
<html>

<head>
    <title>Order History</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="logo-container">
    <img src="../images/logo.png" class="logo">
</div>

<div class="container">

    <h2>Order History</h2>

    <table class="history-table">

        <thead>
            <tr>
                <th>Order ID</th>
                <th>Vendor</th>
                <th>Food</th>
                <th>Quantity</th>
                <th>Subtotal</th>
                <th>Payment</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="historyData">
        </tbody>

    </table>

    <br>

    <h3 id="grandTotal">
        Total : RM 0.00
    </h3>

    <br>

    <p>
        <strong>Pickup Time :</strong>
        <span id="pickupTime"></span>
    </p>

    <br>

    <div class="buttons">

        <a href="tracking.html">
            <button type="button">
                Track Order
            </button>
        </a>

        <a href="review.html">
            <button type="button">
                Leave Review
            </button>
        </a>

        <a href="vendors.html">
            <button type="button" onclick="resetOrder()">
                Order Again
            </button>
        </a>

    </div>

</div>

<script src="../js/app.js"></script>

<script>

loadHistory();

document.getElementById("pickupTime").innerText =
localStorage.getItem("pickupTime") || "-";

</script>

</body>

</html>

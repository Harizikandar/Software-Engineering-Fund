<!DOCTYPE html>
<html>

<head>
    <title>Waffl'd Menu</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="logo-container">
    <img src="../images/logo.png" class="logo">
</div>

<div class="container">

    <h2>Vendor: Waffl'd</h2>

    <div class="food-container">

        <div class="food-card">

            <img src="../images/foods/classic-waffle.png" class="food-img">

            <h3>Classic Waffle</h3>

            <p>Fresh waffle served with maple syrup.</p>

            <p class="price">RM 4.50</p>

            <button onclick="quickAdd(7, 'Waffl\'d', 'Classic Waffle', 4.50)">
                Add To Cart
            </button>

        </div>

        <div class="food-card">

            <img src="../images/foods/egg-waffle.png" class="food-img">

            <h3>Egg Waffle</h3>

            <p>Hong Kong style egg waffle.</p>

            <p class="price">RM 6.50</p>

            <button onclick="quickAdd(8, 'Waffl\'d', 'Egg Waffle', 6.50)">
                Add To Cart
            </button>

        </div>

        <div class="food-card">

            <img src="../images/foods/belgian-waffle.png" class="food-img">

            <h3>Belgian Waffle</h3>

            <p>Belgian waffle with whipped cream.</p>

            <p class="price">RM 9.50</p>

            <button onclick="quickAdd(9, 'Waffl\'d', 'Belgian Waffle', 9.50)">
                Add To Cart
            </button>

        </div>

    </div>

    <div class="buttons">

        <a href="cart.html">
            <button type="button">
                View Cart
            </button>
        </a>

        <a href="vendors.html">
            <button type="button">
                Back
            </button>
        </a>

    </div>

</div>

<script src="../js/app.js"></script>

</body>
</html>

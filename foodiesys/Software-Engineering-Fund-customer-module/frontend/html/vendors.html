<!DOCTYPE html>
<html>

<head>
    <title>Foodiesys Vendors</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="logo-container">
    <img src="../images/logo.png" class="logo">
</div>

<div class="container">

    <h2>Choose Vendor</h2>

    <div class="vendor-container">

        <div class="vendor-card">

            <img src="../images/vendors/sushi.png" class="vendor-img">

            <h3>Sushi Zen</h3>

            <p class="status-open">Status: Open</p>

            <a href="sushi-menu.html">
                <button>Select</button>
            </a>

        </div>

        <div class="vendor-card">

            <img src="../images/vendors/pizza.png" class="vendor-img">

            <h3>The Pizza Slice</h3>

            <p class="status-closed">Status: Closed</p>

            <a href="pizza-menu.html">
                <button>Select</button>
            </a>

        </div>

        <div class="vendor-card">

            <img src="../images/vendors/waffle.png" class="vendor-img">

            <h3>Waffl'd</h3>

            <p class="status-open">Status: Open</p>

            <a href="waffle-menu.html">
                <button>Select</button>
            </a>

        </div>

    </div>

    <div class="buttons">
        <a href="login.html">
            <button type="button">Back</button>
        </a>
    </div>

</div>

</body>
</html>
